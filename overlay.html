<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
limit,
onSnapshot,
getDocs,
getDoc,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIJWltMdeQb4zp1c71146hHfv0SFUTcSg",
authDomain: "xeronate.firebaseapp.com",
projectId: "xeronate",
storageBucket: "xeronate.firebasestorage.app",
messagingSenderId: "82543259196",
appId: "1:82543259196:web:7c819c8b74e1931dd35d39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let pauseMediaShare = false;

let currentMedia = null;

let mediaTimeout = null;
 
onSnapshot(
doc(db,"settings","system"),
(snap)=>{

if(!snap.exists()) return;

const data = snap.data();

const statusLama =
pauseMediaShare;

pauseMediaShare =
data.pauseMediaShare || false;

// BARU DI PAUSE

if(
!statusLama &&
pauseMediaShare
){

if(currentMedia){

clearTimeout(mediaTimeout);

document
.getElementById("mediaShare")
.style.display = "none";

document
.getElementById("ytPlayer")
.src = "";

queue.unshift(
currentMedia
);

currentMedia = null;

console.log(
"Media di-pause"
);

}

}

// BARU DI RESUME

if(
statusLama &&
!pauseMediaShare
){

console.log(
"Media dilanjutkan"
);

prosesQueue();

}

}
);
 
console.log("Firebase berhasil terhubung");
const TARGET = 500000;
let lastId = "";

let queue = [];

let sedangJalan = false;


 
function bacaPesan(teks){
const suara =
new SpeechSynthesisUtterance(teks);

suara.lang = "id-ID";

speechSynthesis.speak(suara);

}
  
function getYoutubeId(url){

if(!url) return null;

if(url.includes("/live/")){
return url.split("/live/")[1].split("?")[0];
}

const reg =
/(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;

const match = url.match(reg);

return match ? match[1] : null;

}
async function prosesQueue(){

if(sedangJalan) return;

sedangJalan = true;

while(queue.length > 0){

const d = queue.shift();
if(Number(d.nominal) >= 100000){

document.getElementById("vipBox")
.style.display = "block";

document.getElementById("vipNama")
.innerText = d.nama;

document.getElementById("vipNominal")
.innerText =
"Rp " +
Number(d.nominal)
.toLocaleString("id-ID");

setTimeout(()=>{

document.getElementById("vipBox")
.style.display = "none";

},8000);

}
if(Number(d.nominal) >= 100000){

const vipSound =
document.getElementById("vipSound");

vipSound.currentTime = 0;

try{
await vipSound.play();
}catch(e){}

}else{

const audio =
document.getElementById("notifAudio");

audio.currentTime = 0;

try{
await audio.play();
}catch(e){}

}

document.getElementById("nama").innerText =
d.nama || "-";

document.getElementById("nominal").innerText =
"Rp " + (d.nominal || 0);

document.getElementById("pesan").innerText =
d.pesan || "";

document.getElementById("box").style.display =
"block";

setTimeout(()=>{

let teksTTS =
`Terima kasih ${d.nama},
telah berdonasi sebesar
${d.nominal} rupiah`;

if(d.pesan){

teksTTS += `. ${d.pesan}`;

}

bacaPesan(teksTTS);

},1500);
if(
d.youtube &&
Number(d.nominal) >= 10000 &&
!pauseMediaShare
){


}

const videoId =
getYoutubeId(d.youtube);

if(videoId){
currentMedia = d;

let durasi = 30000;

if(Number(d.nominal) >= 25000){
durasi = 60000;
}

if(Number(d.nominal) >= 50000){
durasi = 90000;
}

if(Number(d.nominal) >= 100000){
durasi = 120000;
}

document.getElementById("mediaShare")
.style.display = "block";
document.getElementById("mediaNama")
.innerText = d.nama;

document.getElementById("mediaNominal")
.innerText =
"Rp " +
Number(d.nominal)
.toLocaleString("id-ID"); 
 document.getElementById("mediaQueue")
.innerText =
"Antrean tersisa: " + queue.length;
const progress =
document.getElementById("mediaProgress");

progress.style.transition = "none";
progress.style.width = "100%";

setTimeout(()=>{

progress.style.transition =
`width ${durasi}ms linear`;

progress.style.width = "0%";

},50);
document.getElementById("ytPlayer")
.src =
`https://www.youtube.com/embed/${videoId}?autoplay=1`;

mediaTimeout = setTimeout(()=>{

document.getElementById("mediaQueue")
.innerText = "";

document.getElementById("mediaShare")
.style.display = "none";

document.getElementById("ytPlayer")
.src = "";

currentMedia = null;

},durasi);

}

}

await new Promise(resolve =>
setTimeout(resolve,10000)
);

document.getElementById("box").style.display =
"none";


}

sedangJalan = false;

}


async function updateTarget(){

try{

const snap =
await getDocs(collection(db,"donasi"));

let total = 0;

snap.forEach(doc=>{

const d = doc.data();

total += Number(d.nominal || 0);

});

document.getElementById("targetText").innerText =
`Rp ${total.toLocaleString("id-ID")} / Rp ${TARGET.toLocaleString("id-ID")}`;

const persen =
Math.min((total/TARGET)*100,100);

document.getElementById("barFill").style.width =
persen + "%";

}catch(err){

console.log(err);

}

}
const q = query(
collection(db,"donasi"),
orderBy("waktu","desc"),
limit(1)
);

onSnapshot(q,(snapshot)=>{

updateTarget();
updateLeaderboard();
updateRecent();
updateStats();
async function updateStats(){

const snap =
await getDocs(collection(db,"donasi"));

let totalDonasi = 0;

const daftarDonatur = new Set();

snap.forEach(doc=>{

const d = doc.data();

totalDonasi +=
Number(d.nominal || 0);

if(d.nama){

daftarDonatur.add(d.nama);

}

});

document.getElementById("totalDonasi")
.innerText =
"Total Donasi: Rp " +
totalDonasi.toLocaleString("id-ID");

document.getElementById("totalDonatur")
.innerText =
"Total Donatur: " +
daftarDonatur.size;

}
async function updateRecent(){

const qRecent = query(
collection(db,"donasi"),
orderBy("waktu","desc"),
limit(5)
);

const snap =
await getDocs(qRecent);

let html = "";

snap.forEach(doc=>{

const d = doc.data();

html +=
`${d.nama || "Anonim"} - Rp ${
Number(d.nominal || 0)
.toLocaleString("id-ID")
}<br>`;

});

document.getElementById("recentList")
.innerHTML =
html || "Belum ada donasi";

 }
async function updateLeaderboard(){

const snap =
await getDocs(collection(db,"donasi"));

const data = {};

snap.forEach(doc=>{

const d = doc.data();

const nama =
d.nama || "Anonim";

const nominal =
Number(d.nominal || 0);

if(!data[nama]){
data[nama] = 0;
}

data[nama] += nominal;

});

const sorted =
Object.entries(data)
.sort((a,b)=>b[1]-a[1]);

document.getElementById("top1")
.innerText =
sorted[0]
? "🥇 " + sorted[0][0] +
" - Rp " +
sorted[0][1].toLocaleString("id-ID")
: "-";

document.getElementById("top2")
.innerText =
sorted[1]
? "🥈 " + sorted[1][0] +
" - Rp " +
sorted[1][1].toLocaleString("id-ID")
: "-";

document.getElementById("top3")
.innerText =
sorted[2]
? "🥉 " + sorted[2][0] +
" - Rp " +
sorted[2][1].toLocaleString("id-ID")
: "-";

}
snapshot.forEach((doc)=>{

const d = doc.data();

if(lastId === ""){
lastId = doc.id;
return;
}

if(doc.id !== lastId){

lastId = doc.id;

queue.push(d);

prosesQueue();

}

});

});

 window.testDonasi = function(){

queue.push({

nama:"XERON TEST",

nominal:10000,

pesan:"Ini test alert",

youtube:""

});

prosesQueue();

}
 window.testVip = function(){

queue.push({

nama:"VIP TEST",

nominal:100000,

pesan:"VIP DONATION",

youtube:""

});

prosesQueue();

}
 window.testMedia = function(){

queue.push({

nama:"MEDIA TEST",

nominal:10000,

pesan:"Media Share",

youtube:
"https://youtu.be/dQw4w9WgXcQ"

});

prosesQueue();

}

window.togglePauseMedia = async function(){

const ref =
doc(db,"settings","system");

const snap =
await getDoc(ref);

const status =
snap.data().pauseMediaShare || false;

await updateDoc(
ref,
{
pauseMediaShare: !status
}
);

}
 
document
.getElementById("startAudio")
.onclick = () => {

const audio =
document.getElementById("notifAudio");

audio.play()
.then(()=>{
audio.pause();
audio.currentTime = 0;
});

speechSynthesis.speak(
new SpeechSynthesisUtterance("Audio aktif")
);

};

</script>
