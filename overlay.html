<!DOCTYPE html><html>
<head>
<title>Overlay XERONATE</title><style>
body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}

#targetBox{
position:absolute;
left:20px;
top:20px;
background:#111;
color:white;
padding:15px;
border-radius:15px;
width:350px;
}

#barBg{
width:100%;
height:20px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

#barFill{
width:0%;
height:100%;
background:#00ff88;
transition:1s;
}

#box{
position:absolute;
top:20px;
right:20px;
background:#1e1e1e;
color:white;
padding:20px;
border-radius:15px;
width:380px;
display:none;
box-shadow:0 0 20px rgba(0,0,0,.4);
animation:masuk .5s ease;
}

#mediaShare{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
z-index:99999;
background:#000;
padding:10px;
border-radius:15px;
}
#mediaProgressBg{
width:100%;
height:8px;
background:#333;
margin-top:5px;
border-radius:20px;
overflow:hidden;
}

#mediaProgress{
width:100%;
height:100%;
background:#00ff88;
}
 #mediaInfo{
margin-bottom:10px;
text-align:center;
color:white;
}

#mediaNama{
font-size:24px;
font-weight:bold;
}

#mediaNominal{
font-size:20px;
color:#00ff88;
font-weight:bold;
} 
 #mediaQueue{
font-size:14px;
color:#cccccc;
margin-top:5px;
}
.nama{
font-size:28px;
font-weight:bold;
}

.nominal{
font-size:34px;
font-weight:bold;
color:#00ff88;
}

.pesan{
font-size:18px;
margin-top:10px;
}

@keyframes masuk{
from{
opacity:0;
transform:translateX(300px);
}
to{
opacity:1;
transform:translateX(0);
}
}
</style>
</head>
<body><button id="startAudio">Aktifkan Audio</button>

<audio id="notifAudio">
<source src="donasi.mp3" type="audio/mpeg">
</audio><div id="targetBox">
<h3>🎯 Target Donasi</h3>
<div id="targetText">Rp 0 / Rp 500000
</div>
<div id="barBg">
<div id="barFill"></div>
</div>
</div>
<div id="mediaShare" style="display:none;">
<div id="mediaInfo">
  <div id="mediaNama"></div>
  <div id="mediaNominal"></div>
 <div id="mediaQueue"></div>
</div>
  <iframe
    id="ytPlayer"
    width="640"
    height="360"
    src=""
    frameborder="0"
    allow="autoplay"
    allowfullscreen>
  </iframe>

  <div id="mediaProgressBg">
    <div id="mediaProgress"></div>
  </div>

</div>
<div id="box">
<div class="nama" id="nama"></div>
<div class="nominal" id="nominal"></div>
<div class="pesan" id="pesan"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
limit,
onSnapshot,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIJWltMdeQb4zp1c71146hHfv0SFUTcSg",
authDomain: "xeronate.firebaseapp.com",
projectId: "xeronate",
storageBucket: "xeronate.firebasestorage.app",
messagingSenderId: "82543259196",
appId: "1:82543259196:web:7c819c8b74e1931dd35d39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("Firebase berhasil terhubung");
const TARGET = 500000;
let lastId = "";
let queue = [];
let sedangJalan = false;
function bacaPesan(teks){
const suara =
new SpeechSynthesisUtterance(teks);

suara.lang = "id-ID";

speechSynthesis.speak(suara);

}
  
function getYoutubeId(url){

if(!url) return null;

if(url.includes("/live/")){
return url.split("/live/")[1].split("?")[0];
}

const reg =
/(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;

const match = url.match(reg);

return match ? match[1] : null;

}
async function prosesQueue(){

if(sedangJalan) return;

sedangJalan = true;

while(queue.length > 0){

const d = queue.shift();

const audio =
document.getElementById("notifAudio");

audio.currentTime = 0;

try{
await audio.play();
}catch(e){}

document.getElementById("nama").innerText =
d.nama || "-";

document.getElementById("nominal").innerText =
"Rp " + (d.nominal || 0);

document.getElementById("pesan").innerText =
d.pesan || "";

document.getElementById("box").style.display =
"block";

setTimeout(()=>{

bacaPesan(
`${d.nama} berdonasi ${d.nominal} rupiah. Terima kasih.`
);

},1500);

if(
d.youtube &&
Number(d.nominal) >= 10000
){

const videoId =
getYoutubeId(d.youtube);

if(videoId){

let durasi = 30000;

if(Number(d.nominal) >= 25000){
durasi = 60000;
}

if(Number(d.nominal) >= 50000){
durasi = 90000;
}

if(Number(d.nominal) >= 100000){
durasi = 120000;
}

document.getElementById("mediaShare")
.style.display = "block";
document.getElementById("mediaNama")
.innerText = d.nama;

document.getElementById("mediaNominal")
.innerText =
"Rp " +
Number(d.nominal)
.toLocaleString("id-ID"); 
 document.getElementById("mediaQueue")
.innerText =
"Antrean tersisa: " + queue.length;
const progress =
document.getElementById("mediaProgress");

progress.style.transition = "none";
progress.style.width = "100%";

setTimeout(()=>{

progress.style.transition =
`width ${durasi}ms linear`;

progress.style.width = "0%";

},50);
document.getElementById("ytPlayer")
.src =
`https://www.youtube.com/embed/${videoId}?autoplay=1`;

setTimeout(()=>{
document.getElementById("mediaQueue")
.innerText = "";
document.getElementById("mediaShare")
.style.display = "none";

document.getElementById("ytPlayer")
.src = "";

},durasi);

}

}

await new Promise(resolve =>
setTimeout(resolve,10000)
);

document.getElementById("box").style.display =
"none";


}

sedangJalan = false;

}


async function updateTarget(){

try{

const snap =
await getDocs(collection(db,"donasi"));

let total = 0;

snap.forEach(doc=>{

const d = doc.data();

total += Number(d.nominal || 0);

});

document.getElementById("targetText").innerText =
`Rp ${total.toLocaleString("id-ID")} / Rp ${TARGET.toLocaleString("id-ID")}`;

const persen =
Math.min((total/TARGET)*100,100);

document.getElementById("barFill").style.width =
persen + "%";

}catch(err){

console.log(err);

}

}
const q = query(
collection(db,"donasi"),
orderBy("waktu","desc"),
limit(1)
);

onSnapshot(q,(snapshot)=>{

updateTarget();

snapshot.forEach((doc)=>{

const d = doc.data();

if(lastId === ""){
lastId = doc.id;
return;
}

if(doc.id !== lastId){

lastId = doc.id;

queue.push(d);

prosesQueue();

}

});

});

document
.getElementById("startAudio")
.onclick = () => {

const audio =
document.getElementById("notifAudio");

audio.play()
.then(()=>{
audio.pause();
audio.currentTime = 0;
});

speechSynthesis.speak(
new SpeechSynthesisUtterance("Audio aktif")
);

};

</script>
</body>
</html>
