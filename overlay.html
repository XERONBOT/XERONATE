<!DOCTYPE html>
<html>
<head>
<title>Overlay XERONATE</title>

<style>
body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial;
}

#box{
position:absolute;
top:20px;
right:20px;

background:#1e1e1e;
color:white;

padding:20px;
border-radius:15px;

width:380px;

display:none;

box-shadow:0 0 20px rgba(0,0,0,.4);

animation:masuk .5s ease;
}

@keyframes masuk{
from{
opacity:0;
transform:translateX(300px);
}
to{
opacity:1;
transform:translateX(0);
}
}

.nama{
font-size:28px;
font-weight:bold;
}

.nominal{
font-size:34px;
font-weight:bold;
color:#00ff88;
}

.pesan{
font-size:18px;
margin-top:10px;
}
</style>

</head>
<body>

<div id="box">
<div class="nama" id="nama"></div>
<div class="nominal" id="nominal"></div>
<div class="pesan" id="pesan"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
limit,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIJWltMdeQb4zp1c71146hHfv0SFUTcSg",
authDomain: "xeronate.firebaseapp.com",
projectId: "xeronate",
storageBucket: "xeronate.firebasestorage.app",
messagingSenderId: "82543259196",
appId: "1:82543259196:web:7c819c8b74e1931dd35d39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const q = query(
collection(db,"donasi"),
orderBy("waktu","desc"),
limit(1)
);
let lastId = "";
onSnapshot(q,(snapshot)=>{

snapshot.forEach((doc)=>{

const d = doc.data();
if(lastId === ""){

lastId = doc.id;

}else if(doc.id !== lastId){

lastId = doc.id;

document.getElementById("notifAudio").play();

}
document.getElementById("nama").innerText =
d.nama || "-";

document.getElementById("nominal").innerText =
"Rp " + (d.nominal || 0);

document.getElementById("pesan").innerText =
d.pesan || "";

document.getElementById("box").style.display =
"block";

setTimeout(()=>{
document.getElementById("box").style.display =
"none";
},10000);

});

});

</script>

</body>
</html>
