<!DOCTYPE html>
<html>
<head>
<title>Overlay XERONATE</title>

<style>
body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial;
}
#targetBox{
position:absolute;
left:20px;
top:20px;

background:#111;
color:white;

padding:15px;
border-radius:15px;

width:350px;
}

#barBg{
width:100%;
height:20px;

background:#333;
border-radius:20px;

overflow:hidden;
margin-top:10px;
}

#barFill{
width:0%;
height:100%;

background:#00ff88;
transition:1s;
}
#box{
position:absolute;
top:20px;
right:20px;

background:#1e1e1e;
color:white;

padding:20px;
border-radius:15px;

width:380px;

display:none;

box-shadow:0 0 20px rgba(0,0,0,.4);

animation:masuk .5s ease;
}
#mediaShare{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:9999;
}

#ytPlayer{
border-radius:15px;
}
@keyframes masuk{
from{
opacity:0;
transform:translateX(300px);
}
to{
opacity:1;
transform:translateX(0);
}
}

.nama{
font-size:28px;
font-weight:bold;
}

.nominal{
font-size:34px;
font-weight:bold;
color:#00ff88;
}

.pesan{
font-size:18px;
margin-top:10px;
}
</style>

</head>
<body>

<button id="startAudio">
Aktifkan Audio
</button>

<audio id="notifAudio">
  <source src="donasi.mp3" type="audio/mpeg">
</audio>
<audio id="notifAudio">
  <source src="donasi.mp3" type="audio/mpeg">
</audio>
<div id="targetBox">

<h3>🎯 Target Donasi</h3>

<div id="targetText">
Rp 0 / Rp 500000
</div>

<div id="barBg">
<div id="barFill"></div>
</div>

</div>
<div id="box">
<div id="mediaShare" style="display:none;">
  <iframe
    id="ytPlayer"
    width="800"
    height="450"
    src=""
    allow="autoplay"
    frameborder="0">
  </iframe>
</div>
<div class="nama" id="nama"></div>
<div class="nominal" id="nominal"></div>
<div class="pesan" id="pesan"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
limit,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIJWltMdeQb4zp1c71146hHfv0SFUTcSg",
authDomain: "xeronate.firebaseapp.com",
projectId: "xeronate",
storageBucket: "xeronate.firebasestorage.app",
messagingSenderId: "82543259196",
appId: "1:82543259196:web:7c819c8b74e1931dd35d39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const TARGET = 500000;
const q = query(
collection(db,"donasi"),
orderBy("waktu","desc"),
limit(1)
);
let lastId = "";
import {
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function updateTarget(){

const snap =
await getDocs(collection(db,"donasi"));

let total = 0;

snap.forEach(doc=>{

const d = doc.data();

total += Number(d.nominal || 0);

});

document.getElementById("targetText").innerText =
`Rp ${total} / Rp ${TARGET}`;

const persen =
Math.min((total / TARGET) * 100,100);

document.getElementById("barFill").style.width =
persen + "%";

}
onSnapshot(q,(snapshot)=>{
updateTarget();
snapshot.forEach((doc)=>{

const d = doc.data();
if(lastId === ""){

lastId = doc.id;

}else if(doc.id !== lastId){

lastId = doc.id;

const audio =
document.getElementById("notifAudio");

audio.currentTime = 0;

audio.play().then(() => {

setTimeout(() => {

bacaPesan(
`${d.nama} berdonasi ${d.nominal} rupiah`
);

},1500);

}).catch(err => console.log(err));
if(d.youtube){

const videoId =
getYoutubeId(d.youtube);

if(videoId){

document.getElementById("mediaShare")
.style.display = "block";
document.getElementById("mediaShare")
.style.background = "red";

document.getElementById("ytPlayer")
.src =
"https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";

setTimeout(()=>{

document.getElementById("mediaShare")
.style.display = "none";

document.getElementById("ytPlayer")
.src = "";

},30000);

}

}  
}
document.getElementById("nama").innerText =
d.nama || "-";

document.getElementById("nominal").innerText =
"Rp " + (d.nominal || 0);

document.getElementById("pesan").innerText =
d.pesan || "";

document.getElementById("box").style.display =
"block";

setTimeout(()=>{
document.getElementById("box").style.display =
"none";
},10000);

});

});
function bacaPesan(teks){
function getYoutubeId(url){

const reg =
/(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;

const match = url.match(reg);

return match ? match[1] : null;

}
const suara = new SpeechSynthesisUtterance(teks);

suara.lang = "id-ID";
suara.rate = 1;
suara.pitch = 1;

speechSynthesis.speak(suara);

}
document
.getElementById("startAudio")
.onclick = () => {

const audio =
document.getElementById("notifAudio");

audio.play()
.then(()=>{

audio.pause();

audio.currentTime = 0;

});

speechSynthesis.speak(
new SpeechSynthesisUtterance("Audio aktif")
);

};
</script>
</body>
</html>
