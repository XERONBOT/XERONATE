<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Hall Of Fame XERONATE</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
padding:30px;
}

h1{
text-align:center;
color:#00ff88;
text-shadow:
0 0 10px #00ff88,
0 0 20px #00ff88;
}

#hallList{
margin-top:30px;
max-width:800px;
margin-left:auto;
margin-right:auto;
}

.item{

background:#1a1a1a;

padding:20px;

margin-bottom:15px;

border-radius:15px;

border:2px solid #00ff88;

box-shadow:
0 0 10px #00ff88;

display:flex;

justify-content:space-between;

align-items:center;

}

.rank{

font-size:28px;

font-weight:bold;

}

.nama{

font-size:22px;

font-weight:bold;

}

.nominal{

font-size:22px;

color:#00ff88;

font-weight:bold;

}

</style>
</head>

<body>

<h1>🏆 HALL OF FAME XERONATE</h1>

<div id="hallList">

Loading...

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBIJWltMdeQb4zp1c71146hHfv0SFUTcSg",

authDomain: "xeronate.firebaseapp.com",

projectId: "xeronate",

storageBucket: "xeronate.firebasestorage.app",

messagingSenderId: "82543259196",

appId: "1:82543259196:web:7c819c8b74e1931dd35d39"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

async function loadHallOfFame(){

const snap =
await getDocs(
collection(db,"donasi")
);

const data = {};

snap.forEach(doc=>{

const d = doc.data();

const nama =
d.nama || "Anonim";

const nominal =
Number(d.nominal || 0);

if(!data[nama]){

data[nama] = 0;

}

data[nama] += nominal;

});

const ranking =
Object.entries(data)
.sort((a,b)=>b[1]-a[1])
.slice(0,10);

let html = "";

ranking.forEach((item,index)=>{

let medal =
"#" + (index+1);

if(index === 0)
medal = "🥇";

if(index === 1)
medal = "🥈";

if(index === 2)
medal = "🥉";

html += `

<div class="item">

<div>

<div class="rank">
${medal}
</div>

<div class="nama">
${item[0]}
</div>

</div>

<div class="nominal">

Rp ${item[1]
.toLocaleString("id-ID")}

</div>

</div>

`;

});

document
.getElementById("hallList")
.innerHTML = html;

}

loadHallOfFame();

</script>

</body>
</html>
