<!DOCTYPE html>
<html>
<head>
<title>Admin XERONATE</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#222;
padding:15px;
margin-top:10px;
border-radius:10px;
}
</style>

</head>
<body>

<h1>Admin XERONATE</h1>

<div id="listDonasi"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIJWltMdeQb4zp1c71146hHfv0SFUTcSg",
authDomain: "xeronate.firebaseapp.com",
projectId: "xeronate",
storageBucket: "xeronate.firebasestorage.app",
messagingSenderId: "82543259196",
appId: "1:82543259196:web:7c819c8b74e1931dd35d39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("listDonasi");

onSnapshot(
collection(db,"donasi"),
(snapshot)=>{

list.innerHTML="";

snapshot.forEach((doc)=>{

const d = doc.data();

list.innerHTML += `
<div class="card">
<h3>${d.nama}</h3>
<p>Rp ${d.nominal}</p>
<p>${d.pesan}</p>
</div>
`;

});

});

</script>

</body>
</html>
