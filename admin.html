<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XERONATE ADMIN</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
}

button{
width:100%;
padding:12px;
background:#a00028;
color:white;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:10px;
margin-top:10px;
}

p{
margin:5px 0;
}
</style>

</head>
<body>

<h1>XERONATE ADMIN</h1>

<button onclick="loadData()">
Refresh Data
</button>

<div id="hasil"></div>

<script>

function loadData(){

const hasil = document.getElementById("hasil");

let data = localStorage.getItem("donasi");

if(!data){
hasil.innerHTML = `
<div class="card">
Belum ada data donasi
</div>
`;
return;
}

try{

data = JSON.parse(data);

hasil.innerHTML = `
<div class="card">
<h2>${data.nama}</h2>
<p><b>Nominal:</b> Rp ${data.nominal}</p>
<p><b>Pesan:</b> ${data.pesan}</p>
<p><b>Media Share:</b> ${data.youtube}</p>
</div>
`;

}catch(error){

hasil.innerHTML = `
<div class="card">
Terjadi kesalahan membaca data
</div>
`;

}

}

loadData();

</script>

</body>
</html>
